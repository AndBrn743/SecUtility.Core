name: Coverage

on:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/coverage.yml'
      - 'CMakeLists.txt'
      - 'SecUtility/**'
      - 'tests/**'
  pull_request:
    branches: [ master ]
    paths:
      - '.github/workflows/coverage.yml'
      - 'CMakeLists.txt'
      - 'SecUtility/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage (GCC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache lcov

      - name: Configure CMake with coverage
        run: |
          # -march=native enables hardware CRC32 intrinsics (SSE4.2/ARMv8) exercised by some tests.
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DCMAKE_CXX_FLAGS="-march=native --coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build/tests
        run: ctest --output-on-failure

      - name: Generate coverage report
        working-directory: build
        run: |
          lcov --ignore-errors empty,unused,inconsistent,mismatch,negative,source --capture --directory . --output-file coverage.raw.info --rc geninfo_unexecuted_blocks=1
          lcov --ignore-errors empty,unused,mismatch,negative,source --remove coverage.raw.info '/usr/*' '*/_deps/*' "*/catch2/*" --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.info
          fail_ci_if_error: false
          verbose: true
