name: Linux CI

on:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/linux.yml'
      - 'CMakeLists.txt'
      - 'SecUtility/**'
      - 'tests/**'
  pull_request:
    branches: [ master ]
    paths:
      - '.github/workflows/linux.yml'
      - 'CMakeLists.txt'
      - 'SecUtility/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Base matrix: {gcc, clang} × {C++17, C++20} × {Debug, Release}.
          # - C++17 verifies supported-minimum compatibility.
          # - C++20 exercises the C++20-only subset of the library.
          # - Release catches GCC/Clang optimizer-driven diagnostics
          #   (-Wmaybe-uninitialized, -Warray-bounds, etc.) that don't fire in Debug.
          - name: gcc, Debug, C++17
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Debug
            standard: '17'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: gcc, Debug, C++20
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Debug
            standard: '20'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: gcc, Release, C++17
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Release
            standard: '17'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: gcc, Release, C++20
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Release
            standard: '20'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: clang, Debug, C++17
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
            standard: '17'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: clang, Debug, C++20
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
            standard: '20'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: clang, Release, C++17
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Release
            standard: '17'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          - name: clang, Release, C++20
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Release
            standard: '20'
            cxx_flags: ''
            linker_flags: ''
            large_stack: false
          # Sanitizer jobs (clang, Debug, C++20). tsan is relevant because the
          # library contains thread-using utilities and tests.
          - name: clang, Debug, C++20 (asan+ubsan)
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
            standard: '20'
            cxx_flags: '-fsanitize=address,undefined -fno-omit-frame-pointer -fno-optimize-sibling-calls -D_GLIBCXX_DEBUG'
            linker_flags: '-fsanitize=address,undefined'
            large_stack: true
          - name: clang, Debug, C++20 (tsan)
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
            standard: '20'
            cxx_flags: '-fsanitize=thread -fno-omit-frame-pointer'
            linker_flags: '-fsanitize=thread'
            large_stack: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache

      - name: Configure CMake
        run: |
          # -march=native enables hardware CRC32 intrinsics (SSE4.2/ARMv8) exercised by some tests.
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }} \
            -DCMAKE_CXX_STANDARD=${{ matrix.standard }} \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_FLAGS="-march=native ${{ matrix.cxx_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}" \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build/tests
        run: |
          if [ "${{ matrix.large_stack }}" = "true" ]; then ulimit -s 1048576; fi
          ctest --output-on-failure --verbose
